<!DOCTYPE html>
<html>
<head>
    <title>Classes</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            padding: 30px;
            background: #2c3e50;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .card:hover {
            background: #1a252f;
            transform: scale(1.05);
        }

        h2 {
            color: #2c3e50;
        }
    </style>
</head>
<body>

<h2>Select a Class</h2>

<div class="container">
    {% for class in classes %}
        <a class="card" href="{% url 'class_dashboard' class.id %}">
            {{ class.name }}
        </a>
    {% endfor %}
</div>

</body>
</html>
